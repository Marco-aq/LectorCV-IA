services:
  - type: web
    name: reclutador-ia-backend
    runtime: python
    repo: https://github.com/Marco-aq/LectorCV-IA
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GOOGLE_API_KEY
        sync: false

  - type: web
    name: reclutador-ia-frontend
    runtime: python
    repo: https://github.com/Marco-aq/LectorCV-IA
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port 10000
    envVars:
      - key: BACKEND_URL
        value: https://reclutador-ia-backend.onrender.com
